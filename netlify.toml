# ============================================================
# RestoPilot — configuration Netlify
# ============================================================
# Next.js 16 (App Router) + middleware + API routes.
# Le plugin officiel @netlify/plugin-nextjs gère :
#  - les Server/Client Components
#  - les API routes (runtime nodejs)
#  - le middleware (/dashboard/* protection)
# Il est auto-installé par Netlify si détecté via package.json.
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 16 requiert Node >= 18.18 ; on fige sur Node 20 LTS.
  NODE_VERSION      = "20"
  NPM_FLAGS         = "--no-audit --no-fund"
  # Suppression des télémetries build
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Functions (API routes & middleware) ─────────────────────
# Plan payant Netlify : timeout étendu à 300 s par fonction pour
# les routes qui font des appels Claude sur des PDFs volumineux.
# Le champ `timeout` n'est PAS valide dans la section [functions]
# globale — il doit être défini par fonction.
[functions]
  node_bundler = "esbuild"

[functions."api/releve-import"]
  timeout = 300

[functions."api/mercuriale-import"]
  timeout = 300

[functions."api/facture-import"]
  timeout = 300

# ── Variables d'environnement ───────────────────────────────
# À configurer DANS Netlify Dashboard > Site settings > Environment variables
# (ne PAS les mettre ici — ce fichier est commit). Liste :
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   ANTHROPIC_API_KEY
