# ============================================================
# RestoPilot — configuration Netlify
# ============================================================
# Next.js 16 (App Router) + middleware + API routes.
# Le plugin officiel @netlify/plugin-nextjs gère :
#  - les Server/Client Components
#  - les API routes (runtime nodejs)
#  - le middleware (/dashboard/* protection)
# Il est auto-installé par Netlify si détecté via package.json.
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 16 requiert Node >= 18.18 ; on fige sur Node 20 LTS.
  NODE_VERSION      = "20"
  NPM_FLAGS         = "--no-audit --no-fund"
  # Suppression des télémetries build
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Functions (API routes & middleware) ─────────────────────
# Avec @netlify/plugin-nextjs v5+, les API routes App Router tournent
# dans le serveur Next consolidé — les configs per-function de
# netlify.toml ne s'appliquent pas. La durée max s'exprime via
# `export const maxDuration` dans chaque route.tsx.
# On retire node_bundler=esbuild (incompatible avec les packages ESM
# type unpdf — provoque un 502 "Cannot find module" au cold-start).

# ── Variables d'environnement ───────────────────────────────
# À configurer DANS Netlify Dashboard > Site settings > Environment variables
# (ne PAS les mettre ici — ce fichier est commit). Liste :
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   ANTHROPIC_API_KEY
